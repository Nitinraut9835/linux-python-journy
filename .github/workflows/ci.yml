name: DevOps Learning CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        run: sudo apt-get install -y python3 python3-pip

      - name: Install dependencies
        run: pip3 install flask

      - name: Run Python app
        run: python3 app.py
